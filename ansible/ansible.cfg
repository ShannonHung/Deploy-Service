[defaults]
# Local test nodes use keys we don't pre-trust; skip the interactive prompt.
host_key_checking = False

# No log_path on purpose: the company image doesn't write an ansible log file —
# output goes to stdout and run-ansible.sh tees it to the host.

# Inventory is passed explicitly with `-i` by run-ansible.sh, not defaulted here.

stdout_callback = default
force_color = False

[ssh_connection]
# -o options keep non-interactive SSH from hanging on host-key / known_hosts prompts.
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ControlMaster=auto -o ControlPersist=60s
pipelining = True
