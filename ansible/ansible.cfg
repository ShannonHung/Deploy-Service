[defaults]
# Local test nodes use CA-signed host keys we don't pre-trust; skip the prompt.
host_key_checking = False

# Logs land here inside the container; run-ansible.sh bind-mounts this dir out.
log_path = /var/log/ansible/run.log

# Inventory is bind-mounted to /inventory at run time (see run-ansible.sh).
inventory = /inventory

# Keep output readable when streamed to a log file.
stdout_callback = default
force_color = False

[ssh_connection]
# -o options keep non-interactive SSH from hanging on host-key / known_hosts prompts.
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ControlMaster=auto -o ControlPersist=60s
pipelining = True
